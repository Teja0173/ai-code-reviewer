apiVersion: apps/v1
kind: Deployment

metadata:
  name: ai-reviewer-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: ai-reviewer

  template:
    metadata:
      labels:
        app: ai-reviewer

    spec:
      containers:
      - name: ai-reviewer
        image: ai-reviewer:latest

        ports:
        - containerPort: 3000